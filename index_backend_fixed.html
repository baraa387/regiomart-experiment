<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RegioMart Decision-Making Experiment</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0d1f3c;
  --navy2:#162b50;
  --blue:#1e50a0;
  --blue2:#3478e0;
  --accent:#f0a500;
  --accent2:#ffd166;
  --teal:#0f9a8a;
  --rose:#e84855;
  --light:#f5f8ff;
  --mid:#d6e0f5;
  --text:#0f1c33;
  --muted:#5a6e8c;
  --card:#ffffff;
  --radius:20px;
  --shadow:0 8px 40px rgba(13,31,60,.13);
  --shadow-sm:0 2px 12px rgba(13,31,60,.08);
  --green:#10b981;
  --orange:#f59e0b;
  --red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:#eef3fc;color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── ANIMATED BACKGROUND ── */
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse 80% 60% at 10% -20%,rgba(52,120,224,.14) 0%,transparent 70%),
    radial-gradient(ellipse 60% 50% at 90% 110%,rgba(240,165,0,.10) 0%,transparent 60%),
    radial-gradient(ellipse 50% 70% at 60% 50%,rgba(15,154,138,.06) 0%,transparent 70%),
    #eef3fc;
}

/* ── SHELL ── */
.app-shell{max-width:1220px;margin:0 auto;min-height:100vh;padding:24px 20px;display:flex;flex-direction:column;gap:16px}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:18px 28px;background:var(--navy);
  border-radius:var(--radius);box-shadow:0 16px 48px rgba(13,31,60,.28);
  position:relative;overflow:hidden;
}
header::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 50%);pointer-events:none}
.header-logo{display:flex;flex-direction:column;gap:2px}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45)}
h1{font-family:'DM Serif Display',Georgia,serif;font-size:22px;color:#fff;font-weight:400;line-height:1.2}
.badge{
  padding:8px 18px;border-radius:999px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--navy);white-space:nowrap;box-shadow:0 4px 16px rgba(240,165,0,.35);
}

/* ── MAIN CARD ── */
main{
  background:var(--card);border:1px solid rgba(214,224,245,.7);
  border-radius:var(--radius);box-shadow:var(--shadow);
  padding:36px 40px;flex:1;min-height:540px;
  animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
main.flash{animation:fadeUp .35s cubic-bezier(.22,1,.36,1) both}

/* ── FOOTER ── */
footer{font-size:11px;color:var(--muted);text-align:center;padding:4px}

/* ── PROGRESS ── */
.progress-wrap{margin-bottom:28px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.progress{height:6px;background:#e2eaf8;border-radius:999px;overflow:hidden}
.progress>div{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue2),var(--accent));transition:width .6s cubic-bezier(.22,1,.36,1);border-radius:999px}

/* ── SECTION HEADING ── */
.section-head{margin-bottom:24px}
.section-head h2{font-family:'DM Serif Display',Georgia,serif;font-size:30px;font-weight:400;color:var(--navy);line-height:1.2;margin-bottom:6px}
.section-head p{color:var(--muted);font-size:14px;line-height:1.6}

/* ── CARDS ── */
.card{border-radius:16px;padding:20px 24px;margin:14px 0}
.card-info{background:linear-gradient(135deg,#f0f6ff,#e8f0fd);border:1px solid #c9dafb}
.card-warn{background:linear-gradient(135deg,#fffbf0,#fff4d6);border:1px solid #fde68a}
.card-success{background:linear-gradient(135deg,#f0fdf8,#dcfce7);border:1px solid #86efac}
.card-navy{background:var(--navy);color:#fff;border:none}
.card-navy .small{color:rgba(255,255,255,.55)}

/* ── FORM ELEMENTS ── */
label.field-label{display:block;font-weight:700;font-size:13px;letter-spacing:.03em;color:var(--navy);margin:18px 0 6px}
input[type="number"],input[type="text"],select,textarea{
  width:100%;padding:11px 14px;
  border:1.5px solid #d0dbf0;border-radius:12px;
  font-size:14px;font-family:inherit;color:var(--text);
  background:white;transition:border-color .2s,box-shadow .2s;outline:none;
  -webkit-appearance:none;appearance:none;
}
input[type="number"]:focus,select:focus,textarea:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(52,120,224,.12)}
input[type="range"]{padding:0;border:none;background:none;cursor:pointer;accent-color:var(--blue2)}
.range-row{display:flex;align-items:center;gap:10px}
.range-val{font-weight:800;color:var(--blue2);min-width:20px;text-align:center;font-size:16px}
input[type="checkbox"],input[type="radio"]{accent-color:var(--blue2);width:16px;height:16px;cursor:pointer;flex-shrink:0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* ── RADIO GROUP ── */
.radio-group{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.radio-option{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border:1.5px solid #d6e0f5;border-radius:12px;cursor:pointer;
  transition:all .18s;background:white;font-size:14px;font-weight:500;
}
.radio-option:hover{border-color:var(--blue2);background:#f5f8ff}
.radio-option input[type="radio"]:checked ~ span{color:var(--blue2);font-weight:700}
.radio-option:has(input:checked){border-color:var(--blue2);background:linear-gradient(135deg,#f5f8ff,#eaf0fc);box-shadow:0 0 0 3px rgba(52,120,224,.1)}
.consent-row{display:flex;align-items:center;gap:12px;padding:16px;border:1.5px solid #d6e0f5;border-radius:12px;cursor:pointer;font-size:15px;background:white;transition:all .18s}
.consent-row:hover{border-color:var(--blue2);background:#f5f8ff}
.consent-row:has(input:checked){border-color:var(--teal);background:#f0fdf8}

/* ── ACTIONS ── */
.actions{display:flex;gap:12px;justify-content:flex-end;margin-top:28px;flex-wrap:wrap}
button{
  border:0;border-radius:12px;padding:13px 22px;
  font-weight:800;font-size:14px;cursor:pointer;
  font-family:inherit;letter-spacing:.02em;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:white;box-shadow:0 6px 20px rgba(30,80,160,.28);
  transition:all .18s;
}
button:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(30,80,160,.38)}
button:active{transform:translateY(0)}
button.secondary{background:white;color:var(--blue);border:1.5px solid #d6e0f5;box-shadow:var(--shadow-sm)}
button.secondary:hover{background:#f5f8ff;box-shadow:0 6px 18px rgba(13,31,60,.12)}
button.accent-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);box-shadow:0 6px 20px rgba(240,165,0,.32)}
button:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── SMALL TEXT ── */
.small{font-size:12px;color:var(--muted);line-height:1.5}
.caption{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em}

/* ── TABLE ── */
.table-wrap{max-height:450px;overflow:auto;border:1.5px solid #d6e0f5;border-radius:14px;background:white;margin-top:8px}
.table-wrap::-webkit-scrollbar{width:6px;height:6px}
.table-wrap::-webkit-scrollbar-track{background:#f0f4fa}
.table-wrap::-webkit-scrollbar-thumb{background:#b0c0de;border-radius:3px}
table{border-collapse:collapse;width:100%;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--navy);color:white;padding:10px 12px;border-right:1px solid rgba(255,255,255,.12);text-align:left;z-index:2;font-weight:700;letter-spacing:.04em;font-size:11px;text-transform:uppercase}
thead th:last-child{border-right:none}
td{padding:8px 12px;border-bottom:1px solid #eef2fb;text-align:right;white-space:nowrap;font-size:13px;font-variant-numeric:tabular-nums}
td.left{text-align:left}
tr:nth-child(even) td{background:#f8faff}
tr:hover td{background:#eef3fc}
.table-info{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:8px}
.table-info span{background:#e8f0fd;padding:3px 10px;border-radius:999px;font-weight:700;color:var(--blue)}

/* ── DASHBOARD ── */
.dashboard{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:10px}
.chart-card{border:1.5px solid #dbe8f8;border-radius:16px;padding:18px;background:white;box-shadow:var(--shadow-sm)}
.chart-title{font-weight:800;color:var(--navy);font-size:14px;margin-bottom:2px}
.chart-sub{font-size:11px;color:var(--muted);margin-bottom:14px;font-weight:500}

/* ── BAR CHART ── */
.bar-row{display:grid;grid-template-columns:110px 1fr 80px;gap:8px;align-items:center;margin:7px 0;font-size:12px}
.bar-track{height:24px;background:#eef2fb;border-radius:999px;overflow:hidden;position:relative}
.bar{height:100%;border-radius:999px;position:relative;transition:width .8s cubic-bezier(.22,1,.36,1)}
.bar-positive{background:linear-gradient(90deg,var(--blue),var(--blue2))}
.bar-negative{background:linear-gradient(90deg,var(--rose),#f87171)}
.bar-val{font-weight:700;text-align:right;font-variant-numeric:tabular-nums;font-size:12px;color:var(--navy)}

/* ── LINE CHART (SVG-based) ── */
.line-chart-svg{width:100%;height:160px}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.kpi{border:1.5px solid #e2eaf8;border-radius:14px;padding:14px;background:linear-gradient(135deg,#f8faff,white)}
.kpi span{display:block;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi strong{font-size:22px;font-family:'DM Serif Display',serif;color:var(--navy);font-weight:400}
.kpi.highlight{border-color:var(--accent);background:linear-gradient(135deg,#fffbf0,white)}
.kpi.highlight strong{color:var(--orange)}

/* ── TABS ── */
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px;padding:6px;background:#f0f4fd;border-radius:14px}
.tab{
  background:transparent;color:var(--muted);box-shadow:none;
  border:none;padding:9px 18px;font-size:13px;font-weight:700;
  border-radius:10px;transition:all .18s;
}
.tab:hover{background:white;color:var(--navy);transform:none;box-shadow:var(--shadow-sm)}
.tab.active{background:white;color:var(--navy);box-shadow:var(--shadow-sm)}

/* ── TASK LAYOUT ── */
.task-layout{display:grid;grid-template-columns:minmax(0,1.5fr) 340px;gap:20px;align-items:start}
.question-box{
  position:sticky;top:16px;
  border:2px solid var(--blue);border-radius:20px;padding:24px;background:white;
  box-shadow:0 12px 40px rgba(30,80,160,.14);
}
.question-box .q-badge{
  display:inline-block;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  background:var(--blue);color:white;padding:4px 12px;border-radius:999px;margin-bottom:12px;
}
.question-box h2{font-family:'DM Serif Display',serif;font-size:18px;color:var(--navy);margin-bottom:10px;line-height:1.4;font-weight:400}
.question-box .q-text{font-size:13.5px;line-height:1.65;color:var(--text);margin-bottom:16px}

/* ── LIKERT ── */
.likert-table{border:1.5px solid #d6e0f5;border-radius:14px;overflow:hidden;margin-bottom:10px}
.likert-head{display:grid;grid-template-columns:1fr repeat(7,46px);gap:0;background:var(--navy);color:white;padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.likert-head .scale-labels{display:contents}
.likert-line{display:grid;grid-template-columns:1fr repeat(7,46px);gap:0;align-items:center;border-bottom:1px solid #e5ebf8;padding:12px}
.likert-line:last-child{border-bottom:none}
.likert-line:nth-child(even){background:#f8faff}
.likert-line .stmt{font-size:13px;font-weight:500;padding-right:12px;line-height:1.4}
.likert-line label{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-size:11px;color:var(--muted);font-weight:600}
.likert-line label input{margin:0}
.likert-line label:has(input:checked){color:var(--blue2)}
.likert-line label:has(input:checked) input{transform:scale(1.3)}

/* ── RESULT BOX ── */
.result-box{
  background:var(--navy);border-radius:14px;padding:18px;
  white-space:pre-wrap;font-family:'Courier New',monospace;font-size:11.5px;
  color:#7dd3fc;max-height:280px;overflow:auto;line-height:1.7;
}
.result-box::-webkit-scrollbar{width:5px}
.result-box::-webkit-scrollbar-thumb{background:#3478e0;border-radius:3px}

/* ── SCORE DISPLAY ── */
.score-ring{position:relative;width:100px;height:100px;margin:0 auto 16px}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .score-num{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'DM Serif Display',serif;font-size:28px;color:var(--navy);
}
.score-ring .score-num small{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--muted);font-weight:700}
.accuracy-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.pill{padding:5px 12px;border-radius:999px;font-size:11px;font-weight:700}
.pill-correct{background:#dcfce7;color:#166534}
.pill-wrong{background:#fee2e2;color:#991b1b}

/* ── STEP INDICATOR ── */
.step-row{display:flex;gap:0;margin-bottom:28px;overflow:hidden;border-radius:10px}
.step{flex:1;text-align:center;padding:8px 4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:#eef2fb;transition:all .3s;border-right:1px solid white}
.step:last-child{border-right:none}
.step.done{background:#dbe8fd;color:var(--blue2)}
.step.active{background:var(--blue);color:white}

/* ── STORE MATRIX (task 3 helper) ── */
.matrix-row{display:grid;grid-template-columns:120px 1fr 1fr;gap:8px;align-items:center;font-size:12px;margin:6px 0}
.matrix-label{font-weight:700;color:var(--navy)}
.matrix-bar-wrap{position:relative;height:20px;background:#eef2fb;border-radius:999px;overflow:hidden}
.matrix-bar{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.matrix-bar-g{background:linear-gradient(90deg,#10b981,#34d399)}
.matrix-bar-m{background:linear-gradient(90deg,var(--blue),var(--blue2))}
.above-avg{background:#dcfce7!important}
.below-avg{background:#fee2e2!important}
.avg-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(0,0,0,.25);z-index:2}

/* ── TOOLTIPS ── */
[title]{cursor:help}

/* ── MEDIA QUERIES ── */
@media(max-width:900px){
  .grid,.grid3,.dashboard,.task-layout{grid-template-columns:1fr}
  .question-box{position:static}
  main{padding:24px 20px}
  h1{font-size:18px}
  .likert-head,.likert-line{grid-template-columns:1fr repeat(7,34px)}
}
@media(max-width:600px){
  .step span{display:none}
  .likert-head,.likert-line{grid-template-columns:1fr repeat(7,30px)}
}
</style>
</head>

<script>
/* ─── BACKEND CONFIGURATION ─── */
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzRyeLxjzHSgNPFyncv-MfCMDbLCQV4NZy-WnodPyzgGUsQu6GjiVgRd9yRqo3adKxP/exec";
const BACKEND_DEPLOYMENT_ID = "AKfycbzRyeLxjzHSgNPFyncv-MfCMDbLCQV4NZy-WnodPyzgGUsQu6GjiVgRd9yRqo3adKxP";
const STUDY_NAME = "RegioMart Decision-Making Experiment";
const PROTOTYPE_VERSION = "backend-connected-v1.0";

function createParticipantId(){
  return "P-" + Date.now() + "-" + Math.floor(Math.random() * 100000);
}

function setBackendStatus(message,type){
  const el=$("backendStatus");
  if(!el)return;
  const colors={
    pending:["#fff7ed","#fed7aa","#9a3412"],
    success:["#f0fdf4","#86efac","#166534"],
    error:["#fef2f2","#fecaca","#991b1b"]
  };
  const c=colors[type]||colors.pending;
  el.style.background=c[0];
  el.style.borderColor=c[1];
  el.style.color=c[2];
  el.textContent=message;
}

async function sendResultsToBackend(resultsData){
  if(!BACKEND_URL || BACKEND_URL.includes("PASTE_YOUR")){
    setBackendStatus("Backend URL is missing. Results were saved locally only.","error");
    return false;
  }

  const payload={
    ...resultsData,
    backend_url:BACKEND_URL,
    deployment_id:BACKEND_DEPLOYMENT_ID,
    submitted_at:new Date().toISOString(),
    user_agent:navigator.userAgent
  };

  // Google Apps Script receives this safely as e.parameter.
  // This is more reliable than raw JSON for GitHub Pages + Apps Script.
  const formData = new URLSearchParams();
  Object.keys(payload).forEach(key => {
    formData.append(key, payload[key] == null ? "" : String(payload[key]));
  });

  try{
    await fetch(BACKEND_URL,{
      method:"POST",
      mode:"no-cors",
      body:formData
    });
    setBackendStatus("Results submitted to Google Sheet. Please refresh the sheet to check the new row.","success");
    return true;
  }catch(error){
    console.error("Backend submission failed:",error);
    setBackendStatus("Automatic backend submission failed. The CSV/local backup is still available.","error");
    return false;
  }
}

/* ─── METRICS ─── */
function metrics(){
  const q3=REGIOMART_DATA.filter(r=>["Jul","Aug","Sep"].includes(r.Month));
  const q3Rev=Object.entries(groupBy(q3,r=>r.Store)).map(([k,v])=>({label:k,value:sum(v,r=>r.Revenue)})).sort((a,b)=>b.value-a.value);
  const jan=REGIOMART_DATA.filter(r=>r.Month==='Jan'),dec=REGIOMART_DATA.filter(r=>r.Month==='Dec');
  const janCat=groupBy(jan,r=>r.ProductCategory),decCat=groupBy(dec,r=>r.ProductCategory);
  const decline=categories.map(c=>({label:c,value:((sum(decCat[c],r=>r.UnitsSold)-sum(janCat[c],r=>r.UnitsSold))/sum(janCat[c],r=>r.UnitsSold))*100})).sort((a,b)=>a.value-b.value);
  const annualStore=Object.entries(groupBy(REGIOMART_DATA,r=>r.Store)).map(([s,rows])=>{
    const rev=sum(rows,r=>r.Revenue),costs=sum(rows,r=>r.Costs);
    const janRev=sum(rows.filter(r=>r.Month==='Jan'),r=>r.Revenue),decRev=sum(rows.filter(r=>r.Month==='Dec'),r=>r.Revenue);
    return{label:s,growth:(decRev-janRev)/janRev*100,margin:(rev-costs)/rev*100};
  });
  const avgGrowth=sum(annualStore,x=>x.growth)/annualStore.length;
  const avgMargin=sum(annualStore,x=>x.margin)/annualStore.length;
  annualStore.forEach(x=>{x.aboveGrowth=x.growth>avgGrowth;x.aboveMargin=x.margin>avgMargin;x.both=x.aboveGrowth&&x.aboveMargin;});
  const bremGro=REGIOMART_DATA.filter(r=>r.Store==='Bremen-1'&&r.ProductCategory==='Groceries').map(r=>({label:r.Month,value:r.Inventory}));
  const catMargin=Object.entries(groupBy(REGIOMART_DATA,r=>r.ProductCategory)).map(([c,rows])=>{const rev=sum(rows,r=>r.Revenue),costs=sum(rows,r=>r.Costs);return{label:c,value:(rev-costs)/rev*100};}).sort((a,b)=>a.value-b.value);
  return{q3Rev,decline,annualStore,avgGrowth,avgMargin,bremGro,catMargin};
}

/* ─── CHARTS ─── */
function bars(items,suffix=''){
  const vals=items.map(x=>Math.abs(x.value));const max=Math.max(...vals);
  return items.map(x=>{
    const isNeg=x.value<0;
    const pct=Math.max(4,Math.abs(x.value)/max*100);
    const valStr=isNeg?x.value.toFixed(1)+'%':suffix==='%'?x.value.toFixed(1)+'%':'€'+fmtEuro(x.value);
    return`<div class="bar-row">
      <div style="font-weight:600;color:var(--navy);font-size:12px">${x.label}</div>
      <div class="bar-track"><div class="bar ${isNeg?'bar-negative':'bar-positive'}" style="width:${pct}%"></div></div>
      <div class="bar-val" style="color:${isNeg?'var(--rose)':'var(--navy)'}">${valStr}</div>
    </div>`;
  }).join('');
}

function lineChartSVG(items){
  const W=340,H=140,PAD=8;
  const vals=items.map(x=>x.value);
  const min=Math.min(...vals),max=Math.max(...vals);
  const range=max-min||1;
  const pts=items.map((x,i)=>{
    const px=PAD+(i/(items.length-1))*(W-PAD*2);
    const py=H-PAD-(x.value-min)/range*(H-PAD*2);
    return{px,py,label:x.label,value:x.value};
  });
  const polyline=pts.map(p=>`${p.px},${p.py}`).join(' ');
  const areaPoints=`${pts[0].px},${H} `+pts.map(p=>`${p.px},${p.py}`).join(' ')+` ${pts[pts.length-1].px},${H}`;
  // highlight the spike (max value)
  const maxPt=pts.reduce((a,b)=>b.py<a.py?b:a);
  return`<svg class="line-chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3478e0" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#3478e0" stop-opacity="0.01"/>
      </linearGradient>
    </defs>
    <polygon points="${areaPoints}" fill="url(#areaGrad)"/>
    <polyline points="${polyline}" fill="none" stroke="#3478e0" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map(p=>`<circle cx="${p.px}" cy="${p.py}" r="${p===maxPt?6:3.5}" fill="${p===maxPt?'#f0a500':'#3478e0'}" stroke="white" stroke-width="1.5"><title>${p.label}: ${p.value}</title></circle>`).join('')}
    ${pts.map((p,i)=>i%3===0||p===maxPt?`<text x="${p.px}" y="${H}" dy="0" text-anchor="middle" font-size="9" fill="#5a6e8c">${p.label}</text>`:'').join('')}
    ${maxPt?`<text x="${maxPt.px}" y="${maxPt.py-10}" text-anchor="middle" font-size="10" font-weight="bold" fill="#f0a500">${maxPt.value}</text>`:''}
  </svg><p class="small" style="margin-top:4px">Gold dot = highest value · Hover dots for details</p>`;
}

function applyExcelFilters(){
  const tbody=$('excelTbody');
  if(!tbody)return;
  const search=($('excelSearch')?.value||'').trim().toLowerCase();
  const store=$('excelStore')?.value||'';
  const cat=$('excelCategory')?.value||'';
  const month=$('excelMonth')?.value||'';
  const sort=$('excelSort')?.value||'';
  const rows=Array.from(tbody.querySelectorAll('tr'));
  let visible=0;
  rows.forEach(tr=>{
    const text=tr.textContent.toLowerCase();
    const ok=(!search||text.includes(search))&&(!store||tr.dataset.store===store)&&(!cat||tr.dataset.category===cat)&&(!month||tr.dataset.month===month);
    tr.dataset.visible=ok?'1':'0';
    tr.style.display=ok?'':'none';
    if(ok)visible++;
  });
  if(sort){
    const [col,dir]=sort.split('-');
    const idx=parseInt(col,10);
    rows.sort((a,b)=>{
      const av=a.children[idx].dataset.num?Number(a.children[idx].dataset.num):a.children[idx].textContent.trim();
      const bv=b.children[idx].dataset.num?Number(b.children[idx].dataset.num):b.children[idx].textContent.trim();
      if(typeof av==='number'&&typeof bv==='number')return dir==='desc'?bv-av:av-bv;
      return dir==='desc'?String(bv).localeCompare(String(av)):String(av).localeCompare(String(bv));
    }).forEach(r=>tbody.appendChild(r));
  }
  const count=$('excelCount');
  if(count)count.textContent=`Showing ${visible} of ${rows.length} rows`;
}

function resetExcelFilters(){
  ['excelSearch','excelStore','excelCategory','excelMonth','excelSort'].forEach(id=>{const el=$(id);if(el)el.value='';});

  return`<div class="tabs">${tabs.map(t=>`<button class="tab ${currentTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('')}</div>
  <div id="guidedContent">${dashboardContent(currentTab)}</div>`;
}
function switchTab(tab){
  currentTab=tab;
  const tabBtns=document.querySelectorAll('.tab');
  tabBtns.forEach(b=>{b.classList.toggle('active',b.textContent.includes(tab==='revenue'?'Revenue':tab==='trends'?'Trends':'Inventory'));});
  const gc=$('guidedContent');
  if(gc){gc.style.opacity='0';gc.style.transform='translateY(6px)';setTimeout(()=>{gc.innerHTML=dashboardContent(tab);gc.style.transition='opacity .25s,transform .25s';gc.style.opacity='1';gc.style.transform='translateY(0)';},120);}
}

function dataDisplay(){
  if(state.condition==='A')return tableView();
  if(state.condition==='B')return staticDashboard();
  return guidedDashboard('revenue');
}

/* ─── TASK PAGE ─── */
function taskPage(){
  const t=state.taskOrder[state.taskIndex];
  const pct=30+state.taskIndex*12;
  render(`
    ${steps(3)}
    ${progressBar(pct,`Task ${state.taskIndex+1} of 5`)}
    <div class="task-layout">
      <section>${dataDisplay()}</section>
      <aside class="question-box">
        <div class="q-badge">Question ${state.taskIndex+1} / 5</div>
        <h2>${t.title}</h2>
        <p class="q-text">${t.question}</p>
        <div class="radio-group">
          ${t.options.map(o=>`<label class="radio-option"><input type="radio" name="answer" value="${o}"/><span>${o}</span></label>`).join('')}
        </div>
        <div class="actions" style="margin-top:16px">
          <button onclick="submitTask()">Submit answer →</button>
        </div>
      </aside>
    </div>
  `);
  startTimer();
}

function submitTask(){
  const t=state.taskOrder[state.taskIndex];
  const selected=document.querySelector('input[name="answer"]:checked');
  if(!selected){alert("Please select an answer before submitting.");return;}
  stopTimer(t.id);
  state.answers[t.id]=selected.value;
  state.taskIndex++;
  if(state.taskIndex<state.taskOrder.length) taskPage();
  else cognitiveLoad();
}

/* ─── COGNITIVE LOAD ─── */
function cognitiveLoad(){
  const items=[
    ["mental","The task required a lot of mental effort."],
    ["difficulty","I found the task difficult overall."],
    ["pressure","I felt rushed while answering."],
    ["effort","I had to work hard to find needed information."],
    ["frustration","I felt frustrated during the task."],
    ["confidence","I am confident my answers were correct."]
  ];
  render(`
    ${steps(4)}
    ${progressBar(84,'Cognitive Load')}
    <div class="section-head">
      <h2>Cognitive Load Questions</h2>
      <p>Rate each statement on a 7-point scale. <strong>1 = strongly disagree</strong>, <strong>7 = strongly agree</strong>.</p>
    </div>
    <div class="likert-table">
      <div class="likert-head">
        <div>Statement</div>
        ${[1,2,3,4,5,6,7].map(n=>`<div style="text-align:center">${n}</div>`).join('')}
      </div>
      ${items.map(([id,text],i)=>`
        <div class="likert-line" style="${i%2===0?'background:#f8faff':''}">
          <div class="stmt">${text}</div>
          ${[1,2,3,4,5,6,7].map(n=>`<label><input type="radio" name="${id}" value="${n}"/>${n}</label>`).join('')}
        </div>`).join('')}
    </div>
    <div class="actions"><button onclick="saveCognitive()">Continue →</button></div>
  `);
}

function saveCognitive(){
  for(const id of["mental","difficulty","pressure","effort","frustration","confidence"]){
    const el=document.querySelector(`input[name="${id}"]:checked`);
    if(!el){alert("Please answer all questions.");return;}
    state.cognitive[id]=el.value;
  }
  manipulationCheck();
}

/* ─── MANIPULATION CHECK ─── */
function manipulationCheck(){
  render(`
    ${steps(4)}
    ${progressBar(92,'Final Questions')}
    <div class="section-head">
      <h2>Final Questions</h2>
      <p>A few last questions about your experience.</p>
    </div>
    <div class="grid" style="margin-bottom:18px">
      <div>
        <label class="field-label">Which format did you use?</label>
        <select id="seen">
          <option value="">Select…</option>
          <option>Excel/table</option>
          <option>Static dashboard</option>
          <option>Guided dashboard</option>
          <option>I am not sure</option>
        </select>
      </div>
      <div>
        <label class="field-label">How interactive was the format? (1 = not interactive, 7 = very interactive) — <span id="interactv">4</span></label>
        <div class="range-row">
          <span style="font-size:11px;color:var(--muted)">Not at all</span>
          <input id="interact" type="range" min="1" max="7" value="4" style="flex:1" oninput="$('interactv').textContent=this.value"/>
          <span style="font-size:11px;color:var(--muted)">Very</span>
        </div>
      </div>
    </div>
    <label class="field-label">Optional feedback or comments</label>
    <textarea id="feedback" rows="4" placeholder="Any problems, confusion, or suggestions? (optional)"></textarea>
    <div class="actions"><button onclick="finish()">Finish &amp; see results →</button></div>
  `);
}

function finish(){
  const seen=$("seen").value;
  if(!seen){alert("Please answer the format question.");return;}
  state.manipulation={seen,interactivity:$("interact").value};
  state.feedback=$("feedback").value;
  const result=makeResult();
  try{localStorage.setItem('regiomart_last_result',JSON.stringify(result));}catch(e){}
  showResults(result);
  sendResultsToBackend(result);
}

/* ─── RESULTS ─── */
function showResults(result){
  const correct={};let score=0;
  for(const t of tasks){correct[t.id]=state.answers[t.id]===answerKey[t.id]?1:0;score+=correct[t.id];}
  const pct=Math.round(score/5*100);
  const circumference=2*Math.PI*42;
  const dash=circumference*(1-pct/100);
  const pills=tasks.map(t=>`<span class="pill ${correct[t.id]?'pill-correct':'pill-wrong'}">${t.title.split('—')[0].trim()} ${correct[t.id]?'✓':'✗'}</span>`).join('');
  render(`
    ${steps(5)}
    ${progressBar(100,'Complete')}
    <div class="section-head">
      <h2>Thank you for participating!</h2>
      <p>Your responses have been completed. The prototype is now submitting them to the connected Google Apps Script backend.</p>
    </div>
    <div class="grid" style="margin-bottom:20px">
      <div class="card card-info" style="text-align:center;margin:0">
        <div class="score-ring">
          <svg width="100" height="100" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="42" fill="none" stroke="#e2eaf8" stroke-width="8"/>
            <circle cx="50" cy="50" r="42" fill="none"
              stroke="${pct>=80?'#10b981':pct>=60?'#f59e0b':'#ef4444'}"
              stroke-width="8" stroke-linecap="round"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${dash}"
              style="transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1)"/>
          </svg>
          <div class="score-num">${score}/5<small>Score</small></div>
        </div>
        <p style="font-weight:700;color:var(--navy);margin-bottom:8px">${pct}% Accuracy</p>
        <div class="accuracy-pills">${pills}</div>
      </div>
      <div class="card" style="margin:0;border:1.5px solid #d6e0f5">
        <p style="font-weight:700;color:var(--navy);margin-bottom:10px">Response Times</p>
        ${tasks.map(t=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid #eef2fb">
          <span>${t.title.split('—')[0].trim()}</span>
          <span style="font-weight:700;color:${correct[t.id]?'var(--teal)':'var(--rose)'}">${state.times[t.id]||'—'}s</span>
        </div>`).join('')}
      </div>
    </div>
    <div id="backendStatus" class="card" style="border:1.5px solid #fed7aa;background:#fff7ed;color:#9a3412;font-weight:700">
      Sending results to Google Apps Script…
    </div>
    <div class="card card-success">
      <strong>Research data backup:</strong> A local copy is saved in this browser and can be downloaded as CSV below.
    </div>
    <div class="actions">
      <button class="accent-btn" onclick="downloadCSV()">⬇ Download result CSV</button>
      <button class="secondary" onclick="location.reload()">↺ Restart demo</button>
    </div>
    <details style="margin-top:20px">
      <summary style="cursor:pointer;font-weight:700;font-size:13px;color:var(--muted);user-select:none">Preview stored result JSON</summary>
      <div class="result-box" style="margin-top:10px">${JSON.stringify(result,null,2)}</div>
    </details>
  `);
}

function makeResult(){
  const correct={};let score=0;
  for(const t of tasks){correct[t.id]=state.answers[t.id]===answerKey[t.id]?1:0;score+=correct[t.id];}

  const totalTime = tasks.reduce((sum,t)=>sum+(Number(state.times[t.id])||0),0);

  return{
    study_name:STUDY_NAME,
    prototype_version:PROTOTYPE_VERSION,
    participant_id:state.participant,
    participant:state.participant,
    condition:state.condition,
    timestamp:new Date().toISOString(),

    age:state.controls.age||'',
    education:state.controls.education||'',
    work_experience:state.controls.work||'',
    excel_experience:state.controls.excel||'',
    dashboard_experience:state.controls.dashboard||'',
    data_analysis_experience:state.controls.dataexp||'',

    task1_answer:state.answers.task1||'',
    task2_answer:state.answers.task2||'',
    task3_answer:state.answers.task3||'',
    task4_answer:state.answers.task4||'',
    task5_answer:state.answers.task5||'',
    task1_correct:correct.task1,
    task2_correct:correct.task2,
    task3_correct:correct.task3,
    task4_correct:correct.task4,
    task5_correct:correct.task5,
    accuracy_score:score,
    accuracy_percent:Math.round(score/5*100),

    time_task1:state.times.task1||'',
    time_task2:state.times.task2||'',
    time_task3:state.times.task3||'',
    time_task4:state.times.task4||'',
    time_task5:state.times.task5||'',
    total_time:totalTime,

    cognitive_load_1:state.cognitive.mental||'',
    cognitive_load_2:state.cognitive.difficulty||'',
    cognitive_load_3:state.cognitive.pressure||'',
    cognitive_load_4:state.cognitive.effort||'',
    cognitive_load_5:state.cognitive.frustration||'',
    confidence:state.cognitive.confidence||'',

    used_condition:state.manipulation.seen||'',
    perceived_interactivity:state.manipulation.interactivity||'',
    clarity:'',
    feedback:state.feedback||''
  };
}

function downloadCSV(){
  const r=makeResult();const keys=Object.keys(r);
  const csv=keys.join(',')+'\n'+keys.map(k=>`"${String(r[k]).replaceAll('"','""')}"`).join(',');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`regiomart_result_${r.participant_id||r.participant}.csv`;a.click();
  URL.revokeObjectURL(url);
}

/* ─── INIT ─── */
welcome();
</script>
</body>
</html>
